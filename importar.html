function log(msg, cls='') {
  const el = document.getElementById('log');
  el.innerHTML += (cls ? `<span class="${cls}">${msg}</span>` : msg) + '\n';
}

window.doImport = async function() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';
  
  try {
    log('🔌 Conectando a Firebase...');

    // Read existing data
    log('📖 Leyendo datos existentes...');
    const bkSnap = await get(ref(db, PREFIX + 'bookings'));
    const clSnap = await get(ref(db, PREFIX + 'clients'));
    
    let existingBookings = [];
    let existingClients = [];
    
    if (bkSnap.exists()) {
      try { existingBookings = JSON.parse(bkSnap.val()); } catch(e) { log('  ⚠️ No se pudieron leer reservas existentes', 'warn'); }
    }
    if (clSnap.exists()) {
      try { existingClients = JSON.parse(clSnap.val()); } catch(e) { log('  ⚠️ No se pudieron leer clientes existentes', 'warn'); }
    }
    
    log(`  Reservas existentes: ${existingBookings.length}`);
    log(`  Clientes existentes: ${existingClients.length}`);
    
    // Merge - avoid duplicates by ID
    const existingBkIds = new Set(existingBookings.map(b => b.id));
    const existingClIds = new Set(existingClients.map(c => c.id));
    
    const newBookings = IMPORT_DATA.bookings.filter(b => !existingBkIds.has(b.id));
    const newClients  = IMPORT_DATA.clients.filter(c => !existingClIds.has(c.id));
    
    log(`  Nuevas reservas a agregar: ${newBookings.length}`);
    log(`  Nuevos clientes a agregar: ${newClients.length}`);
    
    const mergedBookings = [...existingBookings, ...newBookings];
    const mergedClients  = [...existingClients,  ...newClients];
    
    log('💾 Guardando en Firebase...');
    await set(ref(db, PREFIX + 'clients'),  JSON.stringify(mergedClients));
    log(`  ✅ Clientes guardados (${mergedClients.length} total)`);
    
    await set(ref(db, PREFIX + 'bookings'), JSON.stringify(mergedBookings));
    log(`  ✅ Reservas guardadas (${mergedBookings.length} total)`);
    
    log('\n🎉 ¡Importación completada! Abrí la app y vas a ver todos los datos.', '');
    btn.textContent = '✅ Completado';
    
  } catch(err) {
    log('\n❌ Error: ' + err.message, 'err');
    btn.disabled = false;
  }
};
